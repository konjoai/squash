apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "squash-webhook.fullname" . }}
  labels:
    {{- include "squash-webhook.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "squash-webhook.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "squash-webhook.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "squash-webhook.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: webhook
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python3
            - -m
            - squash.integrations.kubernetes
          args:
            - --port={{ .Values.webhook.port }}
            - --tls-cert=/tls/tls.crt
            - --tls-key=/tls/tls.key
            {{- range .Values.webhook.policies }}
            - --policy={{ . }}
            {{- end }}
            {{- if .Values.webhook.defaultDeny }}
            - --default-deny
            {{- end }}
            {{- range .Values.webhook.excludeNamespaces }}
            - --exclude-namespace={{ . }}
            {{- end }}
          ports:
            - name: webhook-https
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tls-certs
              mountPath: /tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
          env:
            {{- if .Values.squashApiTokenSecret.name }}
            - name: SQUASH_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.squashApiTokenSecret.name }}
                  key: {{ .Values.squashApiTokenSecret.key }}
            {{- end }}
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
      volumes:
        - name: tls-certs
          secret:
            secretName: {{ .Values.tls.secretName | default (printf "%s-tls" (include "squash-webhook.fullname" .)) }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
