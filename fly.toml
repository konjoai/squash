# fly.toml — Squash API deployment on Fly.io
# Deploy: fly deploy --config fly.toml
# Docs:   https://fly.io/docs/reference/configuration/

app = "squash-api"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT            = "4444"
  SQUASH_LOG_LEVEL = "INFO"

[http_service]
  internal_port       = 4444
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0
  processes           = ["app"]

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 500
    soft_limit = 400

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    port         = 4444
    timeout      = "5s"
    type         = "http"
    tls_skip_verify = false

[[mounts]]
  source      = "squash_data"
  destination = "/data"
  initial_size = "1gb"

[deploy]
  strategy = "rolling"
