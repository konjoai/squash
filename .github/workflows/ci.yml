name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install squash-ai + dev dependencies
        run: |
          pip install -e ".[api,signing,sbom,dev]"
          pip install mlflow wandb huggingface-hub

      - name: Run full test suite
        run: |
          python -m pytest tests/ -v --timeout=120 -x

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pip-audit
      - run: pip-audit --requirement <(pip install -e ".[all]" --dry-run 2>&1 | grep "Would install" | awk '{print $3}') || true
