name: Deploy to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'squash/**'
      - 'Dockerfile'
      - 'fly.toml'
      - 'pyproject.toml'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test before deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install squash-ai + dev dependencies
        run: |
          pip install -e ".[api,signing,sbom,dev]"
          pip install mlflow wandb huggingface-hub

      - name: Run test suite
        run: python -m pytest tests/ -v --timeout=120 -x -q

  deploy:
    name: Deploy to Fly.io
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment health
        run: |
          sleep 10
          STATUS=$(curl -sf https://squash-api.fly.dev/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))")
          echo "Health status: $STATUS"
          [ "$STATUS" = "ok" ] || exit 1
        continue-on-error: true
