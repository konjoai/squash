name: Publish to PyPI (SLSA Build L3)

# Phase G.3 — Bulletproof Edition
# This workflow produces SLSA Build Level 3 provenance for every published
# wheel + sdist by delegating the build to slsa-framework/slsa-github-generator.
# The `provenance` step runs the build inside a hardened isolated job,
# captures the artefact digests, signs them with a workload-identity token
# (no long-lived secret), and writes the in-toto Statement to
# `<artifact>.intoto.jsonl`.
#
# After this workflow, `squash self-verify` against the published wheel
# walks: PyPI digest -> SLSA Statement -> builder identity -> source repo digest.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: read-all

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so version derivation works
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build cyclonedx-bom

      - name: Build wheel and sdist
        run: python -m build

      - name: Generate CycloneDX SBOM
        # Phase G.5: SBOM is published alongside the wheel as a release asset.
        # Written to sbom/ (not dist/) so the PyPI publisher only sees .whl + .tar.gz.
        run: |
          python -m pip install --upgrade pip
          python -m pip install cyclonedx-py
          mkdir -p sbom
          cyclonedx-py environment -o sbom/squash-ai.cdx.json || true
          ls -la sbom/

      - name: Compute SHA-256 of every artefact (input to SLSA)
        id: hash
        run: |
          cd dist
          # base64-encode "<sha256>  <filename>" for slsa-github-generator
          echo "hashes=$(sha256sum *.whl *.tar.gz 2>/dev/null | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Upload dist/ for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            sbom/
          if-no-files-found: error

  provenance:
    name: SLSA Build L3 provenance
    needs: [build]
    permissions:
      id-token: write   # OIDC token for keyless signing in transparency log
      contents: write   # attach provenance JSON to release
      actions: read     # read workflow metadata for the Statement
    # The slsa-github-generator workflow IS the trusted builder. Its own
    # SHA is what makes the resulting attestation Build Level 3.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      # upload-assets requires the release event context; workflow_dispatch on a tag
      # returns a Server Error. Keep false so provenance generation never blocks publish.
      upload-assets: false

  publish:
    name: Publish to PyPI (Trusted Publishing)
    # Depend only on build so provenance flakiness cannot block the upload.
    # Provenance artefact is still generated and available in Actions artefacts.
    needs: [build]
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # Trusted publishing to PyPI
      contents: write   # Upload assets to GitHub release
    steps:
      - name: Download dist/
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: artifacts/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: artifacts/dist/
          # Trusted publishing — no API token required.
          # Only .whl and .tar.gz files are in dist/; SBOM is in sbom/.

      - name: Upload release assets to GitHub
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/dist/*.whl
            artifacts/dist/*.tar.gz
            artifacts/sbom/*.cdx.json
