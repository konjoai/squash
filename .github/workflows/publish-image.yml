name: Publish Docker Image to GHCR and Docker Hub

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - "squash/**"
      - "Dockerfile"
      - "pyproject.toml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag override (default: git SHA short)"
        required: false

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/squash
  DH_IMAGE: docker.io/konjoai/squash

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Phase G.3 — Bulletproof Edition: needed for SLSA build provenance
      # via the GitHub Attestations API. Each pushed image carries an
      # OCI build attestation resolving back to this workflow + commit SHA.
      id-token: write       # Sigstore OIDC for keyless signing
      attestations: write   # actions/attest-build-provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DH_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Phase G.3: max-mode provenance embeds the full build graph
          # (source SHA, base image digest, builder identity) into the
          # OCI image attestation.
          provenance: mode=max
          sbom: true

      - name: Generate SLSA build attestation
        # Pushes a signed in-toto Statement to the registry, attached to
        # the image digest. Verifiers retrieve it via `cosign download
        # attestation` or `gh attestation verify`.
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.GHCR_IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Verify image health
        run: |
          docker pull "${{ env.DH_IMAGE }}:latest"
          docker run --rm --env SQUASH_API_TOKEN=test "${{ env.DH_IMAGE }}:latest" \
            python3 -c "import squash; print('squash', squash.__version__, 'ok')"
